name: Build AI review

on:
  workflow_dispatch:
    inputs:
      trip:
        description: "Canonical trip id"
        required: true
        default: "kyrgyzstan-2026"
      day_tag:
        description: "Day tag"
        required: true
        default: "day07"
      model:
        description: "OpenAI text model"
        required: false
        default: "gpt-4o"

permissions:
  contents: write

concurrency:
  group: build-review-${{ github.event.inputs.trip }}-${{ github.event.inputs.day_tag }}
  cancel-in-progress: false

jobs:
  build-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build AI review with rate-limit retries
        run: node run-build-review-v2.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_TEXT_MODEL: ${{ github.event.inputs.model }}
          TRIP: ${{ github.event.inputs.trip }}
          DAY_TAG: ${{ github.event.inputs.day_tag }}

      - name: Commit AI review
        run: |
          git config user.name "travel-journal-bot"
          git config user.email "travel-journal-bot@users.noreply.github.com"
          git add data/${{ github.event.inputs.trip }}/${{ github.event.inputs.day_tag }}-ai-review.json
          if git diff --cached --quiet; then
            echo "No AI review changes"
            exit 0
          fi
          git commit -m "Build AI review for ${{ github.event.inputs.trip }} ${{ github.event.inputs.day_tag }}"
          git push origin HEAD:main
