name: Sync Cloudinary photos

on:
  workflow_dispatch:
    inputs:
      trip:
        description: "Canonical trip id. Use the same value as Cloudinary trip tag and GitHub data folder. Example: kyrgyzstan-2026"
        required: true
        default: "kyrgyzstan-2026"
      day_tag:
        description: "Cloudinary day tag. Example: day02"
        required: true
        default: "day01"
      analyze:
        description: "Run AI photo analysis after sync, only if author notes exist"
        required: false
        type: boolean
        default: true
      model:
        description: "OpenAI vision model for analysis"
        required: false
        default: "gpt-4o-mini"

permissions:
  contents: write

concurrency:
  group: cloudinary-sync-${{ github.event.inputs.trip }}-${{ github.event.inputs.day_tag }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync with latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync photos
        run: node sync-cloudinary.mjs
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          TRIP: ${{ github.event.inputs.trip }}
          DAY_TAG: ${{ github.event.inputs.day_tag }}
          OUT_FILE: data/${{ github.event.inputs.trip }}/${{ github.event.inputs.day_tag }}-photos.json

      - name: Check author notes
        id: author_notes
        run: |
          AUTHOR_NOTES="data/${{ github.event.inputs.trip }}/${{ github.event.inputs.day_tag }}-author-notes.json"
          echo "author_notes_file=$AUTHOR_NOTES" >> "$GITHUB_OUTPUT"
          if [ -f "$AUTHOR_NOTES" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Author notes found: $AUTHOR_NOTES"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Author notes missing: $AUTHOR_NOTES"
            echo "Photo sync will be committed, but AI analysis is intentionally skipped."
          fi

      - name: Reset stale analysis cache
        if: ${{ github.event.inputs.analyze != 'false' && steps.author_notes.outputs.exists == 'true' }}
        run: |
          rm -f data/${{ github.event.inputs.trip }}/${{ github.event.inputs.day_tag }}-analysis.json
          rm -rf data/${{ github.event.inputs.trip }}/analysis-cache/${{ github.event.inputs.day_tag }}-author-context-v2
          echo "Removed stale analysis and context cache before fresh AI analysis."

      - name: Analyze photos
        if: ${{ github.event.inputs.analyze != 'false' && steps.author_notes.outputs.exists == 'true' }}
        run: node analyze-photos.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_VISION_MODEL: ${{ github.event.inputs.model }}
          TRIP: ${{ github.event.inputs.trip }}
          DAY_TAG: ${{ github.event.inputs.day_tag }}
          IN_FILE: data/${{ github.event.inputs.trip }}/${{ github.event.inputs.day_tag }}-photos.json
          OUT_FILE: data/${{ github.event.inputs.trip }}/${{ github.event.inputs.day_tag }}-analysis.json
          DAY_CONTEXT_FILE: data/${{ github.event.inputs.trip }}/${{ github.event.inputs.day_tag }}-author-notes.json
          CACHE_DIR: data/${{ github.event.inputs.trip }}/analysis-cache/${{ github.event.inputs.day_tag }}-author-context-v2

      - name: Explain skipped analysis
        if: ${{ github.event.inputs.analyze != 'false' && steps.author_notes.outputs.exists != 'true' }}
        run: |
          echo "AI analysis skipped because author notes are missing."
          echo "Create data/${{ github.event.inputs.trip }}/${{ github.event.inputs.day_tag }}-author-notes.json first, then rerun this workflow."

      - name: Commit photo data and analysis
        run: |
          git config user.name "travel-journal-bot"
          git config user.email "travel-journal-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          if [ "${{ steps.author_notes.outputs.exists }}" = "true" ] && [ "${{ github.event.inputs.analyze }}" != "false" ]; then
            git commit -m "Sync and analyze Cloudinary photos for ${{ github.event.inputs.trip }} ${{ github.event.inputs.day_tag }}"
          else
            git commit -m "Sync Cloudinary photos for ${{ github.event.inputs.trip }} ${{ github.event.inputs.day_tag }}"
          fi
          git push origin HEAD:main
