name: Auto Sync Cloudinary photos

on:
  push:
    paths:
      - "sync-requests/**/*.json"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read latest sync request
        id: request
        shell: bash
        run: |
          set -euo pipefail
          REQUEST_FILE=$(ls -t sync-requests/*.json sync-requests/**/*.json 2>/dev/null | head -n 1)
          if [ -z "$REQUEST_FILE" ]; then
            echo "No sync request file found"
            exit 1
          fi
          TRIP=$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); console.log(r.trip)" "$REQUEST_FILE")
          DAY_TAG=$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); console.log(r.day_tag)" "$REQUEST_FILE")
          if [ -z "$TRIP" ] || [ -z "$DAY_TAG" ]; then
            echo "trip and day_tag are required in $REQUEST_FILE"
            exit 1
          fi
          echo "trip=$TRIP" >> "$GITHUB_OUTPUT"
          echo "day_tag=$DAY_TAG" >> "$GITHUB_OUTPUT"
          echo "out_file=data/$TRIP/$DAY_TAG-photos.json" >> "$GITHUB_OUTPUT"
          echo "Request: $REQUEST_FILE"
          echo "Trip: $TRIP"
          echo "Day tag: $DAY_TAG"

      - name: Sync photos
        run: node sync-cloudinary.mjs
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          TRIP: ${{ steps.request.outputs.trip }}
          DAY_TAG: ${{ steps.request.outputs.day_tag }}
          OUT_FILE: ${{ steps.request.outputs.out_file }}

      - name: Commit photo data
        run: |
          git config user.name "travel-journal-bot"
          git config user.email "travel-journal-bot@users.noreply.github.com"
          git add data/
          git commit -m "Sync Cloudinary photos for ${{ steps.request.outputs.trip }} ${{ steps.request.outputs.day_tag }}" || echo "No changes"
          git push
