name: Analyze photos

on:
  workflow_dispatch:
    inputs:
      trip:
        description: "Canonical trip id. Example: kyrgyzstan-2026"
        required: true
        default: "kyrgyzstan-2026"
      day_tag:
        description: "Day tag. Example: day02"
        required: true
        default: "day02"
      model:
        description: "OpenAI vision model"
        required: false
        default: "gpt-4o-mini"

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Analyze photos
        run: node analyze-photos.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_VISION_MODEL: ${{ github.event.inputs.model }}
          TRIP: ${{ github.event.inputs.trip }}
          DAY_TAG: ${{ github.event.inputs.day_tag }}
          IN_FILE: data/${{ github.event.inputs.trip }}/${{ github.event.inputs.day_tag }}-photos.json
          OUT_FILE: data/${{ github.event.inputs.trip }}/${{ github.event.inputs.day_tag }}-analysis.json

      - name: Commit photo analysis
        run: |
          git config user.name "travel-journal-bot"
          git config user.email "travel-journal-bot@users.noreply.github.com"
          git add data/
          git commit -m "Analyze photos for ${{ github.event.inputs.trip }} ${{ github.event.inputs.day_tag }}" || echo "No changes"
          git push
