name: Analyze photos

on:
  workflow_dispatch:
    inputs:
      trip:
        description: "Canonical trip id. Example: kyrgyzstan-2026"
        required: true
        default: "kyrgyzstan-2026"
      day_tag:
        description: "Day tag. Example: day06"
        required: true
        default: "day06"
      model:
        description: "OpenAI vision/text model"
        required: false
        default: "gpt-4o-mini"

permissions:
  contents: write

concurrency:
  group: analyze-${{ github.event.inputs.trip }}-${{ github.event.inputs.day_tag }}
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync with latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Analyze photos with high-detail vision
        run: node analyze-photos-v2.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_VISION_MODEL: ${{ github.event.inputs.model }}
          TRIP: ${{ github.event.inputs.trip }}
          DAY_TAG: ${{ github.event.inputs.day_tag }}
          IN_FILE: data/${{ github.event.inputs.trip }}/${{ github.event.inputs.day_tag }}-photos.json
          OUT_FILE: data/${{ github.event.inputs.trip }}/${{ github.event.inputs.day_tag }}-analysis.json

      - name: Build observation-grounded AI review
        run: node build-review-v2.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_TEXT_MODEL: ${{ github.event.inputs.model }}
          TRIP: ${{ github.event.inputs.trip }}
          DAY_TAG: ${{ github.event.inputs.day_tag }}

      - name: Commit analysis and AI review
        run: |
          git config user.name "travel-journal-bot"
          git config user.email "travel-journal-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Analyze photos and build AI review v2 for ${{ github.event.inputs.trip }} ${{ github.event.inputs.day_tag }}"
          git push origin HEAD:main
